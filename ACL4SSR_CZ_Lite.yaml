proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - 🇺🇲 美国节点
      - DIRECT

  - name: 🇺🇲 美国节点
    type: select
    use:
      - 你的订阅名称  # 替换为你的订阅名称

  - name: 💬 OpenAi
    type: select
    proxies:
      - 🇺🇲 美国节点
      - DIRECT

  - name:: 📲 电报消息
    type: select
    proxies:
      - 🇺🇲 美国节点
      - DIRECT

  - name: 📹 油管视频
    type: select
    proxies:
      - 🇺🇲 美国节点
      - DIRECT

  - name: 🌍 国外媒体
    type: select
    proxies:
      - 🇺🇲 美国节点
      - DIRECT

  - name: Ⓜ️ 微软服务
    type: select
    proxies:
      - DIRECT
      - 🇺🇲 美国节点

  - name: Ⓜ️ 微软Bing
    type: select
    proxies:
      - DIRECT
      - 🇺🇲 美国节点

  - name: 🍎 苹果服务
    type: select
    proxies:
      - DIRECT
      - 🇺🇲 美国节点

  - name: 🎮 游戏平台
    type: select
    proxies:
      - DIRECT
      - 🇺🇲 美国节点

  - name: 📺 哔哩哔哩
    type: select
    proxies:
      - DIRECT

  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🇺🇲 美国节点

  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🇺🇲 美国节点
      - DIRECT

